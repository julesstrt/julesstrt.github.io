<style>
/* Cap education/skills grid at 2 columns on XL screens (1280px+).
   The template uses xl:grid-cols-3 but with only 2 education items
   each card gets only 1/3 of the container width — too narrow.
   2 columns → each card gets 1/2 width, much more readable. */
@media (min-width: 1280px) {
  .xl\:grid-cols-3 {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  }
}

/* Hide skill level progress bars in the Skills section */
.skills-wrapper {
  display: none !important;
}
</style>
